<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f3f6f4">
  <title>qifan 知识库</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="home-view">
  <header class="site-header">
    <div class="site-nav">
      <button class="brand" id="brandHome" type="button" aria-label="返回知识库首页">
        <span class="brand-mark" aria-hidden="true">▦</span>
        <span>qifan 知识库</span>
      </button>
      <nav class="top-links" id="topCategories" aria-label="知识库分类">
        <button class="nav-search" id="navSearch" type="button" aria-label="搜索">⌕</button>
      </nav>
    </div>
  </header>

  <main class="home" id="homeView">
    <section class="hero">
      <div class="hero-copy">
        <div class="eyebrow"><span></span><strong id="heroStats">正在整理知识...</strong></div>
        <h1>把零散资料，<br><em>整理成可复用的知识</em></h1>
        <p>阅读、沟通、社交与历史。把资料变成随时可查、能够行动、值得反复阅读的个人知识系统。</p>
        <div class="hero-actions">
          <button class="primary-action" id="continueReading" type="button">继续上次阅读 <span>→</span></button>
        </div>
      </div>
    </section>

    <section class="home-section">
      <div class="section-heading category-heading"><div><h2>知识分类</h2></div><p>选择一个分类，继续上次停留的位置。</p></div>
      <div class="category-grid" id="homeCategories"></div>
    </section>
  </main>

  <main class="reader-shell" id="readerView" aria-hidden="true">
    <aside class="chapter-nav">
      <div class="chapter-tools">
        <button class="back-home" id="backHome" type="button">← 首页</button>
        <label class="chapter-search"><span>⌕</span><input id="readerSearch" type="search" placeholder="搜索文章"></label>
      </div>
      <div class="chapter-tree" id="chapterTree"></div>
    </aside>

    <article class="reader-panel">
      <div class="mobile-reader-bar"><button id="mobileBack" type="button">← 文章</button></div>
      <div class="document-window">
        <div class="document" id="detail"></div>
      </div>
    </article>
  </main>

  <div class="search-modal" id="searchModal" aria-hidden="true">
    <button class="search-backdrop" id="searchBackdrop" type="button" aria-label="关闭搜索"></button>
    <div class="search-dialog" role="dialog" aria-modal="true" aria-labelledby="searchTitle">
      <div class="search-dialog-header">
        <div><span>SEARCH</span><h2 id="searchTitle">搜索知识库</h2></div>
        <button class="search-close" id="searchClose" type="button" aria-label="关闭搜索">×</button>
      </div>
      <label class="home-search">
        <span>⌕</span>
        <input id="homeSearch" type="search" placeholder="搜索知识、人物、主题、标签或方法..." autocomplete="off">
        <kbd>Enter</kbd>
      </label>
      <p class="search-hint">输入关键词后按 Enter，直接进入匹配内容。</p>
    </div>
  </div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
