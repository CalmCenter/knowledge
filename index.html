<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>qifan 本地知识库</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>qifan 本地知识库</h1>
        <div class="subtitle">按知识库分类沉淀内容：读书知识、饭局社交攻略，以及后续可扩展的新分类。</div>
      </div>
      <input id="search" class="search" type="search" placeholder="搜索标题、分类、主题、场景、话术、概念、行动建议或复习题">
    </div>
  </header>

  <main>
    <aside class="focus-rail" aria-label="专注阅读摘要">
      <button id="railToggle" class="rail-toggle" type="button">展开</button>
      <div class="rail-item">
        <span class="rail-value" id="railNoteCount">0</span>
        <span class="rail-label">卡片</span>
      </div>
      <div class="rail-item">
        <span class="rail-value" id="railTopicCount">0</span>
        <span class="rail-label">主题</span>
      </div>
      <div class="rail-item">
        <span class="rail-value" id="railCategory">全部</span>
        <span class="rail-label">分类</span>
      </div>
      <div class="rail-item">
        <span class="rail-value" id="railOrder">---</span>
        <span class="rail-label">当前</span>
      </div>
    </aside>

    <aside class="panel sidebar">
      <div class="stat-grid">
        <div class="stat">
          <strong id="noteCount">0</strong>
          <span class="muted">卡片总数</span>
        </div>
        <div class="stat">
          <strong id="topicCount">0</strong>
          <span class="muted">主题</span>
        </div>
      </div>
      <div class="section-title">知识库分类</div>
      <div id="categories" class="category-list"></div>
      <div class="section-title">主题筛选</div>
      <div id="topics" class="topic-list"></div>
    </aside>

    <section class="panel list">
      <div id="cards"></div>
    </section>

    <article class="panel detail">
      <div id="detail"></div>
    </article>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
